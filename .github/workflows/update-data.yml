name: Update scanner data
on:
  workflow_dispatch:              # cron-job.org primary trigger
  schedule:
    - cron: "*/30 * * * *"        # backup: every 30 min, 24x7
permissions:
  contents: write
concurrency:
  group: scanner
  cancel-in-progress: true
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install dependencies
        run: pip install yfinance pandas numpy
      - name: Run scanner
        run: python scanner.py
      - name: Commit data.json
        run: |
          git config user.name "scanner-bot"
          git config user.email "scanner-bot@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then echo "No changes"; exit 0; fi
          git commit -m "update crypto data [skip ci]"
          git pull --rebase origin main
          git push origin main
